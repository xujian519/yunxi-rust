<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A7C6F;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#8B7355;stop-opacity:0.15" />
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4A7C6F;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4A7C6F;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8B7355;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#8B7355;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="200" cy="220" r="140" fill="url(#glow1)" />
  <circle cx="120" cy="140" r="60" fill="url(#glow2)" />
  <circle cx="320" cy="100" r="50" fill="url(#glow1)" opacity="0.5" />

  <!-- AI neural network nodes behind -->
  <g stroke="#4A7C6F" stroke-width="1.2" opacity="0.3">
    <line x1="80" y1="80" x2="120" y2="130" />
    <line x1="120" y1="130" x2="160" y2="100" />
    <line x1="160" y1="100" x2="200" y2="140" />
    <line x1="80" y1="80" x2="160" y2="100" />
    <line x1="120" y1="130" x2="200" y2="140" />
    <line x1="320" y1="70" x2="280" y2="110" />
    <line x1="280" y1="110" x2="240" y2="90" />
    <line x1="320" y1="70" x2="240" y2="90" />
  </g>
  <g fill="#4A7C6F" opacity="0.5">
    <circle cx="80" cy="80" r="6" />
    <circle cx="120" cy="130" r="5" />
    <circle cx="160" cy="100" r="4" />
    <circle cx="200" cy="140" r="5" />
    <circle cx="320" cy="70" r="5" />
    <circle cx="280" cy="110" r="4" />
    <circle cx="240" cy="90" r="4" />
  </g>
  <g fill="#8B7355" opacity="0.35">
    <circle cx="100" cy="180" r="4" />
    <circle cx="330" cy="160" r="5" />
    <circle cx="340" cy="250" r="4" />
    <circle cx="70" cy="250" r="5" />
    <circle cx="310" cy="300" r="4" />
  </g>
  <g stroke="#8B7355" stroke-width="0.8" opacity="0.2">
    <line x1="120" y1="130" x2="100" y2="180" />
    <line x1="200" y1="140" x2="180" y2="180" />
    <line x1="280" y1="110" x2="330" y2="160" />
  </g>

  <!-- Floating patent documents -->
  <g transform="translate(260, 180) rotate(12)">
    <rect x="0" y="0" width="60" height="75" rx="6" fill="#FAF8F5" stroke="#A39E98" stroke-width="1.2" opacity="0.85"/>
    <line x1="10" y1="12" x2="50" y2="12" stroke="#A39E98" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="10" y1="22" x2="45" y2="22" stroke="#C4BEB7" stroke-width="1" stroke-linecap="round"/>
    <line x1="10" y1="30" x2="48" y2="30" stroke="#C4BEB7" stroke-width="1" stroke-linecap="round"/>
    <line x1="10" y1="38" x2="40" y2="38" stroke="#C4BEB7" stroke-width="1" stroke-linecap="round"/>
    <line x1="10" y1="46" x2="42" y2="46" stroke="#C4BEB7" stroke-width="1" stroke-linecap="round"/>
    <line x1="10" y1="54" x2="35" y2="54" stroke="#C4BEB7" stroke-width="1" stroke-linecap="round"/>
    <rect x="15" y="62" width="30" height="8" rx="2" fill="none" stroke="#4A7C6F" stroke-width="1"/>
    <text x="19" y="68" font-family="monospace" font-size="5" fill="#4A7C6F">PAT.</text>
  </g>

  <g transform="translate(50, 200) rotate(-8)">
    <rect x="0" y="0" width="55" height="70" rx="6" fill="#FAF8F5" stroke="#A39E98" stroke-width="1.2" opacity="0.8"/>
    <line x1="8" y1="10" x2="47" y2="10" stroke="#A39E98" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="20" x2="40" y2="20" stroke="#C4BEB7" stroke-width="1" stroke-linecap="round"/>
    <line x1="8" y1="28" x2="44" y2="28" stroke="#C4BEB7" stroke-width="1" stroke-linecap="round"/>
    <line x1="8" y1="36" x2="36" y2="36" stroke="#C4BEB7" stroke-width="1" stroke-linecap="round"/>
    <line x1="8" y1="44" x2="38" y2="44" stroke="#C4BEB7" stroke-width="1" stroke-linecap="round"/>
    <rect x="12" y="56" width="30" height="8" rx="2" fill="none" stroke="#8B7355" stroke-width="1"/>
    <text x="16" y="62" font-family="monospace" font-size="5" fill="#8B7355">DOC</text>
  </g>

  <g transform="translate(300, 280) rotate(-15)">
    <rect x="0" y="0" width="50" height="60" rx="5" fill="#FAF8F5" stroke="#A39E98" stroke-width="1.2" opacity="0.75"/>
    <line x1="8" y1="10" x2="42" y2="10" stroke="#A39E98" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="18" x2="36" y2="18" stroke="#C4BEB7" stroke-width="1" stroke-linecap="round"/>
    <line x1="8" y1="26" x2="40" y2="26" stroke="#C4BEB7" stroke-width="1" stroke-linecap="round"/>
    <line x1="8" y1="34" x2="32" y2="34" stroke="#C4BEB7" stroke-width="1" stroke-linecap="round"/>
    <rect x="10" y="46" width="30" height="7" rx="2" fill="none" stroke="#4A7C6F" stroke-width="1"/>
    <text x="14" y="51" font-family="monospace" font-size="5" fill="#4A7C6F">AI</text>
  </g>

  <!-- Sparkle decorations -->
  <g fill="#4A7C6F" opacity="0.4">
    <path d="M140 90 Q143 98 151 101 Q143 104 140 112 Q137 104 129 101 Q137 98 140 90Z" />
    <path d="M300 200 Q302 205 307 207 Q302 209 300 214 Q298 209 293 207 Q298 205 300 200Z" />
    <path d="M80 300 Q82 305 87 307 Q82 309 80 314 Q78 309 73 307 Q78 305 80 300Z" />
  </g>
  <g fill="#8B7355" opacity="0.3">
    <path d="M350 140 Q352 146 358 148 Q352 150 350 156 Q348 150 342 148 Q348 146 350 140Z" />
    <path d="M160 320 Q162 325 167 327 Q162 329 160 334 Q158 329 153 327 Q158 325 160 320Z" />
  </g>

  <!-- Character: anime-style female office worker waving -->
  <g transform="translate(200, 260)">
    <!-- Body/shirt -->
    <path d="M-45 60 Q-48 20 -30 5 Q-15 -5 0 -5 Q15 -5 30 5 Q48 20 45 60 Q40 75 0 78 Q-40 75 -45 60Z" fill="#F5F2EE" stroke="#C4BEB7" stroke-width="1.5"/>
    <!-- Collar -->
    <path d="M-15 2 L0 15 L15 2" fill="none" stroke="#C4BEB7" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="15" x2="0" y2="22" stroke="#C4BEB7" stroke-width="1.2"/>
    <!-- Neck -->
    <rect x="-10" y="-15" width="20" height="18" rx="6" fill="#F5D6C3" stroke="#E8C4B0" stroke-width="1"/>
    <!-- Hair back -->
    <path d="M-38 -30 Q-42 -10 -38 5 Q-35 15 -30 10 Q-32 -5 -28 -20Z" fill="#6B4F3A"/>
    <path d="M38 -30 Q42 -10 38 5 Q35 15 30 10 Q32 -5 28 -20Z" fill="#6B4F3A"/>
    <!-- Face -->
    <ellipse cx="0" cy="-20" rx="32" ry="34" fill="#F5D6C3" stroke="#E8C4B0" stroke-width="1"/>
    <!-- Hair front -->
    <path d="M-32 -35 Q-20 -55 0 -52 Q20 -55 32 -35 Q34 -20 30 -12 Q28 -18 25 -28 Q20 -22 18 -32 Q12 -25 10 -38 Q5 -28 0 -38 Q-5 -28 -10 -38 Q-12 -25 -18 -32 Q-20 -22 -25 -28 Q-28 -18 -30 -12 Q-34 -20 -32 -35Z" fill="#6B4F3A"/>
    <!-- Eyes -->
    <ellipse cx="-14" cy="-18" rx="6" ry="7" fill="#3D3229"/>
    <ellipse cx="14" cy="-18" rx="6" ry="7" fill="#3D3229"/>
    <circle cx="-12" cy="-21" r="2.5" fill="white"/>
    <circle cx="16" cy="-21" r="2.5" fill="white"/>
    <!-- Eyebrows -->
    <path d="M-22 -30 Q-14 -34 -6 -30" fill="none" stroke="#6B4F3A" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M6 -30 Q14 -34 22 -30" fill="none" stroke="#6B4F3A" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Smile -->
    <path d="M-8 -6 Q0 3 8 -6" fill="none" stroke="#C9856E" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="-20" cy="-10" rx="6" ry="4" fill="#E89B8B" opacity="0.3"/>
    <ellipse cx="20" cy="-10" rx="6" ry="4" fill="#E89B8B" opacity="0.3"/>
  </g>

  <!-- Waving arm -->
  <g transform="translate(200, 260)">
    <path d="M35 15 Q55 5 65 -15 Q68 -22 62 -26 Q56 -28 52 -22 Q48 -10 42 0 Q38 8 32 12Z" fill="#F5D6C3" stroke="#E8C4B0" stroke-width="1"/>
    <!-- Sleeve -->
    <path d="M30 5 Q38 0 42 8 Q40 15 35 18 Q30 15 30 5Z" fill="#FAF8F5" stroke="#C4BEB7" stroke-width="1.2"/>
  </g>
</svg>