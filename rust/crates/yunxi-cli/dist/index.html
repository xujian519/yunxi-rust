<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>云熙智能体</title>
  <style>
    :root {
      --bg: #0f0f1a; --surface: #1a1a2e; --border: #2a2a44;
      --text: #c8c8d4; --dim: #666680; --brand: #b388ff; --brand2: #7c4dff;
      --accent: #ff80ab; --heading: #e8e0ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }
    .titlebar {
      background: linear-gradient(135deg, #1a1a2e, #1e1630);
      padding: 10px 24px; display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border); user-select: none;
    }
    .titlebar h1 { font-size: 15px; font-weight: 600; color: var(--heading); flex: 1; }
    .titlebar .ver { font-size: 11px; color: var(--dim); font-family: "SF Mono", monospace; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .sidebar {
      width: 220px; background: var(--surface); padding: 8px 0;
      border-right: 1px solid var(--border);
    }
    .nav-item {
      padding: 10px 20px; cursor: pointer; color: var(--dim); font-size: 13px;
      border-left: 2px solid transparent; transition: all 0.15s;
    }
    .nav-item:hover { color: var(--text); background: rgba(179,136,255,0.06); }
    .nav-item.active { color: var(--brand); border-left-color: var(--brand2); font-weight: 500; }
    .content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .panel {
      flex: 1; overflow-y: auto; padding: 24px; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
    }
    .panel h2 { font-size: 26px; color: var(--heading); margin-bottom: 8px; }
    .panel p { color: var(--dim); font-size: 14px; }
    .input-area {
      display: flex; gap: 10px; padding: 16px 24px;
      background: var(--surface); border-top: 1px solid var(--border);
    }
    .input-area input {
      flex: 1; padding: 10px 16px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 14px; outline: none;
    }
    .input-area input:focus { border-color: var(--brand2); }
    .input-area button {
      padding: 10px 28px; background: linear-gradient(135deg, var(--brand), var(--brand2));
      color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .input-area button:hover { opacity: 0.9; }
    .status-bar {
      padding: 6px 24px; background: #0a0a14; font-size: 11px;
      color: var(--dim); display: flex; gap: 24px; border-top: 1px solid var(--border);
    }
    .diag { margin-top: 16px; padding: 16px; background: var(--surface); border-radius: 8px; }
    .diag h3 { font-size: 13px; color: var(--heading); margin-bottom: 8px; }
    .diag pre { font-size: 12px; font-family: "SF Mono", monospace; color: var(--text); white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="titlebar">
    <span style="font-size:20px">🌸</span>
    <h1>云熙智能体-专利代理人的智能助手</h1>
    <span class="ver" id="version">v---</span>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="nav-item active">💬 AI 对话</div>
      <div class="nav-item">📝 专利撰写</div>
      <div class="nav-item">🔎 检索分析</div>
      <div class="nav-item">⚖ 对比报告</div>
    </div>
    <div class="content">
      <div class="panel" id="welcome">
        <span style="font-size:48px;margin-bottom:16px">🌸</span>
        <h2>云熙智能体</h2>
        <p>专业专利智能工具 — 撰写 · 检索 · 分析 · 答复</p>
        <div class="diag" id="diag" style="width:100%;max-width:500px"></div>
      </div>
      <div class="input-area">
        <input type="text" id="msg" placeholder="输入消息后按 Enter 发送…" />
        <button onclick="sendMsg()">发送</button>
      </div>
    </div>
  </div>
  <div class="status-bar">
    <span>模型: deepseek-v4-pro</span>
    <span>引擎: Tauri 2.x</span>
    <span id="backend-status">⏳ 检测中…</span>
  </div>

  <script>
    var invokeFn = null;
    var ready = false;

    function diag(title, text) {
      var d = document.getElementById("diag");
      d.innerHTML = "<h3>" + title + "</h3><pre>" + text + "</pre>";
    }

    function showStatus(s) {
      document.getElementById("backend-status").textContent = s;
    }

    function init() {
      // 尝试所有可能的 Tauri API 路径
      var candidates = [
        ["__TAURI__", function() {
          var t = window.__TAURI__;
          if (!t) return null;
          if (typeof t.invoke === "function") return t.invoke.bind(t);
          if (t.core && typeof t.core.invoke === "function") return t.core.invoke.bind(t.core);
          return null;
        }],
        ["__TAURI_INTERNALS__", function() {
          var t = window.__TAURI_INTERNALS__;
          if (!t) return null;
          if (typeof t.invoke === "function") return t.invoke.bind(t);
          if (t.core && typeof t.core.invoke === "function") return t.core.invoke.bind(t.core);
          return null;
        }],
        ["window.ipc", function() {
          var w = window;
          for (var k in w) {
            if (k.toLowerCase().indexOf("invoke") >= 0 && typeof w[k] === "function") {
              return w[k].bind(window);
            }
          }
          return null;
        }]
      ];

      var found = [];
      for (var i = 0; i < candidates.length; i++) {
        try {
          var fn = candidates[i][1]();
          if (fn) {
            invokeFn = fn;
            found.push(candidates[i][0] + " ✅");
            break;
          } else {
            found.push(candidates[i][0] + " ❌");
          }
        } catch(e) {
          found.push(candidates[i][0] + " err: " + String(e));
        }
      }

      if (!invokeFn) {
        // 列出 window 上所有可能的 API
        var keys = [];
        for (var k in window) {
          try {
            var v = window[k];
            var t = typeof v;
            if (t === "string" && k.length < 30) keys.push(k + "='" + v + "'");
            else if (t === "function" && k.length < 40) keys.push(k + "():fn");
            else if (t === "object" && v && k.length < 30) keys.push(k + ":obj");
          } catch(e) {}
        }
        found.push("");
        found.push("window keys: " + keys.join(", "));
        diag("Tauri API 未检测到", found.join("\n"));
        showStatus("⚠️ API 不可用");
        return;
      }

      diag("API 路径", found.join("\n"));
      showStatus("🔄 连接中…");

      invokeFn("get_version").then(function(v) {
        document.getElementById("version").textContent = "v" + v;
        showStatus("✅ 已连接");
        ready = true;
        diag("连接成功", "版本: " + v + "\nIPC 路径: " + found[0]);
      }).catch(function(e) {
        showStatus("❌ " + String(e));
        diag("IPC 调用失败", String(e));
        // 也尝试 greet 命令
        invokeFn("greet", { name: "test" }).then(function(m) {
          showStatus("✅ greet 可用");
          diag("连通测试", "greet: " + m);
          ready = true;
        }).catch(function(e2) {
          diag("所有命令失败", "get_version: " + String(e) + "\ngreet: " + String(e2));
        });
      });
    }

    function sendMsg() {
      if (!ready || !invokeFn) {
        diag("未就绪", "请等待后端连接完成。");
        return;
      }
      var input = document.getElementById("msg");
      var name = input.value.trim() || "用户";
      invokeFn("greet", { name: name }).then(function(msg) {
        diag("响应", msg);
        input.value = "";
      }).catch(function(e) {
        diag("调用失败", String(e));
      });
    }

    document.getElementById("msg").addEventListener("keydown", function(e) {
      if (e.key === "Enter") sendMsg();
    });

    document.querySelectorAll(".nav-item").forEach(function(item) {
      item.addEventListener("click", function() {
        document.querySelectorAll(".nav-item").forEach(function(i) { i.classList.remove("active"); });
        this.classList.add("active");
      });
    });

    window.onerror = function(msg, url, line) {
      diag("JS 错误", String(msg) + "\n位置: " + (url||"?") + ":" + (line||"?"));
    };

    setTimeout(init, 300);
  </script>
</body>
</html>
