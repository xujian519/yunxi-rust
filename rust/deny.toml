# cargo-deny 配置 — 云熙智能体（YunXi）
# 使用方式: cargo deny check

[advisories]
# 安全漏洞数据库检查
db-path = "~/.cargo/advisory-db"
vulnerability = "deny"
unmaintained = "warn"
unsound = "warn"
yanked = "warn"
notice = "warn"

[licenses]
# 允许的开源许可证
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "0BSD",
    "Zlib",
    "Unlicense",
    "MPL-2.0",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "Unicode-3.0",
    "MIT-0",
]

# 许可证表达式中的例外
private = { ignore = true }

[[licenses.clarify]]
# ring 使用 OpenSSL 和 ISC 双许可
name = "ring"
expression = "ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
# 重复依赖检查
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
# 仅允许 crates.io 和本地的 crate
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
unknown-registry = "warn"
unknown-git = "warn"
