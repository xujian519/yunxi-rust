name: Release Desktop

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    name: Build macOS .app / .dmg
    runs-on: macos-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: rust/crates/yunxi-cli/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: rust/crates/yunxi-cli/frontend
        run: npm ci

      - name: Build frontend
        working-directory: rust/crates/yunxi-cli/frontend
        run: npm run build

      - name: Build and bundle desktop app
        run: cargo build --release --features desktop -p yunxi-cli --bin yunxi-desktop

      - name: Run Tauri bundle
        working-directory: rust/crates/yunxi-cli
        run: |
          if [ -d "frontend/dist" ]; then
            npm run bundle:desktop
          fi

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: yunxi-desktop-macos
          path: rust/target/release/bundle/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            rust/target/release/bundle/dmg/*.dmg
            rust/target/release/bundle/macos/*.app
          generate_release_notes: true
