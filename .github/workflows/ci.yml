name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust 核心 ──────────────────────────────────────────
  rust-fmt:
    name: Rust / Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo fmt -- --check

  rust-clippy:
    name: Rust / Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    name: Rust / Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo test --workspace
      - run: cargo test --workspace -- --ignored 2>&1 || true

  rust-audit:
    name: Rust / Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      - run: cargo audit --deny warnings

  rust-doc:
    name: Rust / Doc
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo doc --workspace --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── Desktop (Tauri) ───────────────────────────────────
  desktop:
    name: Desktop / Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: rust/crates/yunxi-cli/frontend/package-lock.json
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install frontend dependencies
        working-directory: rust/crates/yunxi-cli/frontend
        run: npm ci
      - name: Lint frontend
        working-directory: rust/crates/yunxi-cli/frontend
        run: npx eslint . --max-warnings 0 2>/dev/null || true
      - name: Build frontend
        working-directory: rust/crates/yunxi-cli/frontend
        run: npm run build
      - name: Cargo check desktop
        run: cargo check -p yunxi-cli --features desktop --bin yunxi-desktop

  # ── Python ────────────────────────────────────────────
  python-lint:
    name: Python / Lint & Type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff mypy
      - run: ruff check src/ tests/
      - run: mypy src/ --ignore-missing-imports

  python-test:
    name: Python / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install pytest
      - run: python -m pytest tests/ -v --tb=short

  # ── 汇总 ──────────────────────────────────────────────
  ci-pass:
    name: CI Passed
    if: always()
    runs-on: ubuntu-latest
    needs:
      - rust-fmt
      - rust-clippy
      - rust-test
      - rust-audit
      - rust-doc
      - desktop
      - python-lint
      - python-test
    steps:
      - name: Check results
        run: |
          echo "rust-fmt:     ${{ needs.rust-fmt.result }}"
          echo "rust-clippy:  ${{ needs.rust-clippy.result }}"
          echo "rust-test:    ${{ needs.rust-test.result }}"
          echo "rust-audit:   ${{ needs.rust-audit.result }}"
          echo "rust-doc:     ${{ needs.rust-doc.result }}"
          echo "desktop:      ${{ needs.desktop.result }}"
          echo "python-lint:  ${{ needs.python-lint.result }}"
          echo "python-test:  ${{ needs.python-test.result }}"
          fail=false
          for r in "${{ needs.rust-fmt.result }}" \
                   "${{ needs.rust-clippy.result }}" \
                   "${{ needs.rust-test.result }}" \
                   "${{ needs.rust-audit.result }}" \
                   "${{ needs.rust-doc.result }}" \
                   "${{ needs.desktop.result }}" \
                   "${{ needs.python-lint.result }}" \
                   "${{ needs.python-test.result }}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              fail=true
            fi
          done
          if $fail; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed!"
