<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 主渐变 - 温暖的粉紫色调 -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef9f4"/>
      <stop offset="100%" stop-color="#f3e8f9"/>
    </radialGradient>
    <!-- 花瓣渐变1 -->
    <linearGradient id="petal1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8a0bf"/>
      <stop offset="100%" stop-color="#c27ba0"/>
    </linearGradient>
    <!-- 花瓣渐变2 -->
    <linearGradient id="petal2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a5e5"/>
      <stop offset="100%" stop-color="#a66bbf"/>
    </linearGradient>
    <!-- 花瓣渐变3 -->
    <linearGradient id="petal3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4b8d1"/>
      <stop offset="100%" stop-color="#e888a8"/>
    </linearGradient>
    <!-- 花瓣渐变4 -->
    <linearGradient id="petal4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8d4e3"/>
      <stop offset="100%" stop-color="#8bb5cf"/>
    </linearGradient>
    <!-- 花瓣渐变5 -->
    <linearGradient id="petal5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7d794"/>
      <stop offset="100%" stop-color="#e8b84d"/>
    </linearGradient>
    <!-- 花蕊渐变 -->
    <radialGradient id="centerGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#fff7e6"/>
      <stop offset="60%" stop-color="#f7d794"/>
      <stop offset="100%" stop-color="#e8b84d"/>
    </radialGradient>
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#9b7bb5" flood-opacity="0.25"/>
    </filter>
    <filter id="petalShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#7a5a9a" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- 外层装饰花瓣 (较大，淡色) -->
  <g opacity="0.3" filter="url(#shadow)">
    <ellipse cx="256" cy="130" rx="65" ry="90" fill="url(#petal2)" transform="rotate(0 256 256)"/>
    <ellipse cx="256" cy="130" rx="65" ry="90" fill="url(#petal4)" transform="rotate(72 256 256)"/>
    <ellipse cx="256" cy="130" rx="65" ry="90" fill="url(#petal1)" transform="rotate(144 256 256)"/>
    <ellipse cx="256" cy="130" rx="65" ry="90" fill="url(#petal5)" transform="rotate(216 256 256)"/>
    <ellipse cx="256" cy="130" rx="65" ry="90" fill="url(#petal3)" transform="rotate(288 256 256)"/>
  </g>

  <!-- 主花瓣层 -->
  <g filter="url(#petalShadow)">
    <!-- 花瓣1 - 上 -->
    <path d="M256 120 C290 150 310 200 300 250 C290 230 270 210 256 200 C242 210 222 230 212 250 C202 200 222 150 256 120Z" fill="url(#petal1)" transform="rotate(0 256 256)"/>
    <!-- 花瓣2 -->
    <path d="M256 120 C290 150 310 200 300 250 C290 230 270 210 256 200 C242 210 222 230 212 250 C202 200 222 150 256 120Z" fill="url(#petal2)" transform="rotate(72 256 256)"/>
    <!-- 花瓣3 -->
    <path d="M256 120 C290 150 310 200 300 250 C290 230 270 210 256 200 C242 210 222 230 212 250 C202 200 222 150 256 120Z" fill="url(#petal3)" transform="rotate(144 256 256)"/>
    <!-- 花瓣4 -->
    <path d="M256 120 C290 150 310 200 300 250 C290 230 270 210 256 200 C242 210 222 230 212 250 C202 200 222 150 256 120Z" fill="url(#petal4)" transform="rotate(216 256 256)"/>
    <!-- 花瓣5 -->
    <path d="M256 120 C290 150 310 200 300 250 C290 230 270 210 256 200 C242 210 222 230 212 250 C202 200 222 150 256 120Z" fill="url(#petal5)" transform="rotate(288 256 256)"/>
  </g>

  <!-- 内层花瓣 -->
  <g opacity="0.85">
    <path d="M256 160 C275 180 285 215 280 245 C274 230 265 220 256 215 C247 220 238 230 232 245 C227 215 237 180 256 160Z" fill="#fff0f5" transform="rotate(36 256 256)"/>
    <path d="M256 160 C275 180 285 215 280 245 C274 230 265 220 256 215 C247 220 238 230 232 245 C227 215 237 180 256 160Z" fill="#f0e6ff" transform="rotate(108 256 256)"/>
    <path d="M256 160 C275 180 285 215 280 245 C274 230 265 220 256 215 C247 220 238 230 232 245 C227 215 237 180 256 160Z" fill="#fff5f0" transform="rotate(180 256 256)"/>
    <path d="M256 160 C275 180 285 215 280 245 C274 230 265 220 256 215 C247 220 238 230 232 245 C227 215 237 180 256 160Z" fill="#e6f0ff" transform="rotate(252 256 256)"/>
    <path d="M256 160 C275 180 285 215 280 245 C274 230 265 220 256 215 C247 220 238 230 232 245 C227 215 237 180 256 160Z" fill="#fff8e6" transform="rotate(324 256 256)"/>
  </g>

  <!-- 花蕊 -->
  <circle cx="256" cy="256" r="38" fill="url(#centerGrad)" stroke="#e8b84d" stroke-width="1.5"/>
  <!-- 花蕊细节 -->
  <circle cx="248" cy="248" r="4" fill="#d4a030" opacity="0.5"/>
  <circle cx="264" cy="248" r="4" fill="#d4a030" opacity="0.5"/>
  <circle cx="256" cy="260" r="4" fill="#d4a030" opacity="0.5"/>
  <circle cx="244" cy="258" r="3" fill="#d4a030" opacity="0.4"/>
  <circle cx="268" cy="258" r="3" fill="#d4a030" opacity="0.4"/>
  <circle cx="256" cy="244" r="3" fill="#d4a030" opacity="0.4"/>

  <!-- 花蕊高光 -->
  <ellipse cx="250" cy="250" rx="14" ry="10" fill="white" opacity="0.3"/>

  <!-- 底部品牌文字 -->
  <text x="256" y="420" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif" font-size="36" font-weight="600" fill="#6b4c7a">云熙智能体</text>
  <text x="256" y="455" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="400" fill="#9b8aaa" letter-spacing="3">YunXi Agent</text>
</svg>
